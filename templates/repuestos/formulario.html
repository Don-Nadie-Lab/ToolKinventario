{% extends "base.html" %}

{% block title %}{{ 'Editar' if repuesto else 'Nuevo' }} Artículo - ToolKinventario{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header py-3 bg-warning text-dark">
                <h6 class="m-0 font-weight-bold">
                    <i class="bi bi-tools"></i>
                    {{ 'Editar' if repuesto else 'Registrar Nuevo' }} Artículo
                </h6>
            </div>
            <div class="card-body">
                <form id="formRepuesto" method="POST" action="{{ url_for('views.editar_repuesto', id=repuesto.id) if repuesto else url_for('views.nuevo_repuesto') }}">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="descripcion" class="form-label">Descripción / Nombre del Artículo *</label>
                            <input type="text" class="form-control" id="descripcion" name="descripcion" 
                                   value="{{ repuesto.descripcion if repuesto else '' }}" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label for="marca" class="form-label">Marca</label>
                            <input type="text" class="form-control" id="marca" name="marca" 
                                   value="{{ repuesto.marca if repuesto else '' }}">
                        </div>

                        <div class="col-md-6">
                            <label for="tipo" class="form-label">Tipo de Posesión</label>
                            <select class="form-select" id="tipo" name="tipo">
                                <option value="Propio (Reventa)" {{ 'selected' if repuesto and repuesto.tipo == 'Propio (Reventa)' else '' }}>Propio (Reventa)</option>
                                <option value="Consignación" {{ 'selected' if repuesto and repuesto.tipo == 'Consignación' else '' }}>Consignación</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="cantidad" class="form-label">Stock Actual</label>
                            <input type="number" class="form-control" id="cantidad" name="cantidad" 
                                   value="{{ repuesto.cantidad if repuesto else '0' }}" min="0">
                        </div>

                        <div class="col-md-8">
                            <label for="proveedor_id" class="form-label">Proveedor</label>
                            <select class="form-select" id="proveedor_id" name="proveedor_id">
                                <option value="">Seleccionar proveedor...</option>
                                {% for p in proveedores %}
                                <option value="{{ p.id }}" {{ 'selected' if repuesto and repuesto.proveedor_id == p.id else '' }}>{{ p.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Sección de Precios -->
                        <div class="col-12 mt-4">
                            <h6 class="border-bottom pb-2">Configuración de Precios</h6>
                        </div>

                        <div class="col-md-4">
                            <label for="precio_compra" class="form-label">Precio de Compra ($)</label>
                            <input type="number" step="0.01" class="form-control" id="precio_compra" name="precio_compra" 
                                   value="{{ repuesto.precio_compra if repuesto else '0.00' }}">
                        </div>

                        <div class="col-md-4">
                            <label for="ganancia_porcentaje" class="form-label">% Ganancia</label>
                            <div class="input-group">
                                <input type="number" step="0.1" class="form-control" id="ganancia_porcentaje" name="ganancia_porcentaje" 
                                       value="{{ repuesto.ganancia_porcentaje if repuesto else '30.0' }}">
                                <span class="input-group-text">%</span>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="precio_venta" class="form-label">Precio de Venta Sugerido</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="text" class="form-control bg-light" id="precio_venta" readonly 
                                       value="{{ "%.2f"|format(repuesto.precio_venta) if repuesto else '0.00' }}">
                            </div>
                        </div>

                        <div class="col-12 mt-4 d-flex justify-content-between">
                            <a href="{{ url_for('views.lista_repuestos') }}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-save"></i> Guardar Artículo
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const inputCosto = document.getElementById('precio_compra');
    const inputGanancia = document.getElementById('ganancia_porcentaje');
    const inputVenta = document.getElementById('precio_venta');

    function calcularVenta() {
        const costo = parseFloat(inputCosto.value) || 0;
        const ganancia = parseFloat(inputGanancia.value) || 0;
        const total = costo * (1 + (ganancia / 100));
        inputVenta.value = total.toFixed(2);
    }

    inputCosto.addEventListener('input', calcularVenta);
    inputGanancia.addEventListener('input', calcularVenta);
});
</script>
{% endblock %}
