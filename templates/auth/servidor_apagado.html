<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolKinventario - Sistema Apagado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        h1 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        p {
            color: #333;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .info strong {
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128465;</div>
        <h1>Sistema Apagado</h1>
        <p>Cierra esta pestana del navegador.</p>
        <p>Para iniciar el sistema nuevamente, usa el icono de <strong>ToolKinventario</strong> en el escritorio.</p>
        <div class="info">
            <p><strong>Usuario:</strong> admin</p>
            <p><strong>Contrasena:</strong> admin123</p>
        </div>
    </div>
</body>
</html>
