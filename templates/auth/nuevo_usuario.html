{% extends "base.html" %}

{% block title %}Nuevo Usuario - ToolKinventario{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2><i class="bi bi-person-plus"></i> Nuevo Usuario</h2>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Usuario *</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre *</label>
                        <input type="text" class="form-control" name="nombre" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña *</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rol *</label>
                        <select class="form-select" name="rol" required>
                            <option value="usuario">Usuario</option>
                            <option value="admin">Administrador</option>
                            <option value="maestro_carga">Maestro de Carga</option>
                        </select>
                    </div>
                    <hr>
                    <h6>Preguntas de Seguridad (Opcional)</h6>
                    <div class="mb-3">
                        <label class="form-label">Primera Pregunta de Seguridad</label>
                        <input type="text" class="form-control" name="pregunta_seguridad_1" placeholder="Ej: Cual es el nombre de tu primera mascota?">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Respuesta</label>
                        <input type="text" class="form-control" name="respuesta_seguridad_1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Segunda Pregunta de Seguridad</label>
                        <input type="text" class="form-control" name="pregunta_seguridad_2" placeholder="Ej: En que ciudad naciste?">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Respuesta</label>
                        <input type="text" class="form-control" name="respuesta_seguridad_2">
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Crear Usuario
                        </button>
                        <a href="{{ url_for('auth.lista_usuarios') }}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
