{% extends "base.html" %}

{% block title %}Editar Usuario - ToolKinventario{% endblock %}

{% block page_content %}
<div class="row">
    <div class="col-12">
        <h2><i class="bi bi-pencil"></i> Editar Usuario</h2>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" class="form-control" value="{{ usuario.username }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre *</label>
                        <input type="text" class="form-control" name="nombre" value="{{ usuario.nombre }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" name="email" value="{{ usuario.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rol *</label>
                        <select class="form-select" name="rol" required>
                            <option value="usuario" {% if usuario.rol == 'usuario' %}selected{% endif %}>Usuario</option>
                            <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
                            <option value="maestro_carga" {% if usuario.rol == 'maestro_carga' %}selected{% endif %}>Maestro de Carga</option>
                        </select>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" name="activo" id="activo" {% if usuario.activo %}checked{% endif %}>
                        <label class="form-check-label" for="activo">Usuario activo</label>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label">Nueva Contrasena (dejar vacio para mantener)</label>
                        <input type="password" class="form-control" name="password">
                    </div>
                    <hr>
                    <h6>Preguntas de Seguridad</h6>
                    <div class="mb-3">
                        <label class="form-label">Primera Pregunta de Seguridad</label>
                        <input type="text" class="form-control" name="pregunta_seguridad_1" value="{{ usuario.pregunta_seguridad_1 or '' }}" placeholder="Ej: Cual es el nombre de tu primera mascota?">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Respuesta</label>
                        <input type="text" class="form-control" name="respuesta_seguridad_1" value="{{ usuario.respuesta_seguridad_1 or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Segunda Pregunta de Seguridad</label>
                        <input type="text" class="form-control" name="pregunta_seguridad_2" value="{{ usuario.pregunta_seguridad_2 or '' }}" placeholder="Ej: En que ciudad naciste?">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Respuesta</label>
                        <input type="text" class="form-control" name="respuesta_seguridad_2" value="{{ usuario.respuesta_seguridad_2 or '' }}">
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Guardar Cambios
                        </button>
                        <a href="{{ url_for('auth.lista_usuarios') }}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
